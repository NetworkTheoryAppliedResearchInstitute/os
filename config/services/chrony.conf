# NTARI OS NTP Configuration
# Accurate time is critical for SoHoLINK credential verification

# Public NTP servers (use local servers if available)
server 0.pool.ntp.org iburst
server 1.pool.ntp.org iburst
server 2.pool.ntp.org iburst
server 3.pool.ntp.org iburst

# Allow local network to sync (for offline deployments)
allow 192.168.0.0/16
allow 10.0.0.0/8
allow 172.16.0.0/12

# Record drift
driftfile /var/lib/chrony/drift

# Make steps at start
makestep 1.0 3

# Serve time even if not synchronized
local stratum 10

# Log
logdir /var/log/chrony
