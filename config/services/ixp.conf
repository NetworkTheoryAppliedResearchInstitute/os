# NTARI OS — IXP Configuration
# /etc/ntari/ixp.conf
#
# Master configuration file for all IXP packages (Phases 14–19).
# All ntari-ixp-* services read this file on configure/activate.
#
# Copy to /etc/ntari/ixp.conf on the target node and edit before
# enabling any IXP service:
#   rc-update add ntari-ixp-bgp default
#   rc-update add ntari-ixp-fabric default
#   rc-update add ntari-ixp-registry default
#   rc-update add ntari-ixp-lg default

[ixp]
# Master switch — all IXP packages check this on configure.
# Set to true only after filling in all required fields below.
enabled = false

# Role of this node at the exchange.
#   route_server — full IXP route server (most deployments)
#   member       — a peering member connecting to a route server
#   observer     — read-only: consumes topology data, no BGP sessions
role = route_server

[bgp]
# ASN of this route server.  Replace with a real public ASN or a
# private ASN (64512–65534) for lab use.
router_asn = 65000

# Shared peering LAN assigned to the IXP switching fabric.
ixp_lan_ipv4 = 192.0.2.0/24
ixp_lan_ipv6 = 2001:db8::/32

# Per-peer prefix limit.  Sessions exceeding this are torn down.
max_prefixes_per_peer = 1000

# RPKI origin validation via a local RTR server (gortr or routinator).
# Set rtr_host to the RTR server address if rpki_enabled = true.
rpki_enabled = true
rtr_host = 127.0.0.1
rtr_port = 8282

# IRR databases to query for prefix filter generation via bgpq4.
irr_sources = ARIN,RIPE,APNIC,LACNIC,AFRINIC

[fabric]
# Switching backend.
#   auto         — use OVS if present, else Linux bridge + VLAN filtering
#   openvswitch  — force Open vSwitch
#   linux_bridge — force Linux bridge
backend = auto

# Bridge interface name for the IXP peering LAN.
peering_bridge = br-ixp

# Physical port naming prefix (used for port inventory discovery).
port_prefix = eth

[registry]
# Sync member ASN/prefix data from PeeringDB (read-only API, no auth needed
# for public data).
peeringdb_sync = true

# Sync interval in seconds (default 1 hour).
peeringdb_sync_interval = 3600

# SQLite database path for the member registry.
db_path = /var/lib/ntari/ixp/registry.db

[looking_glass]
# Enable the Looking Glass HTTP service.
enabled = true

# If public = true, no authentication is required (standard IXP practice).
# If public = false, Caddy basic-auth protects the /lg/ path.
public = false

# Internal port (Caddy proxies /lg/* to this).
port = 5000

# Maximum looking glass queries per IP per minute.
rate_limit = 10

[settlement]
# Lightning-settled paid peering.  Requires SoHoLINK to be running and
# accessible at soholink_api.  Set enabled = true only after SoHoLINK
# is configured and ntari-ixp-registry has active members.
enabled = false

# Billing rate per gigabyte transferred, in satoshis.
rate_per_gb_sats = 10

# Settlement interval in seconds (default 1 hour).
settlement_interval_seconds = 3600

# Minimum amount before generating a Lightning invoice (dust limit).
dust_limit_sats = 1000

# SoHoLINK API base URL.
soholink_api = http://localhost:8080

# SQLite ledger path for settlement audit trail.
ledger_path = /var/lib/ntari/ixp/settlement.db
